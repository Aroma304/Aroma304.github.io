<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼多多助力互助平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f5;font-family:微软雅黑;}
.container{max-width:420px;margin:0 auto;background:#fff;padding:20px;}
.title{text-align:center;font-size:22px;color:#e64340;padding:15px 0;font-weight:bold;}
.input-box{display:flex;gap:10px;margin:20px 0;}
#code{flex:1;padding:12px 15px;border:1px solid #ddd;border-radius:6px;font-size:16px;}
#submit{padding:12px 20px;background:#e64340;color:#fff;border:none;border-radius:6px;font-size:16px;}
.list-title{font-size:16px;color:#333;margin:10px 0;}
.item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #eee;}
.code-text{font-size:16px;color:#333;letter-spacing:2px;}
.btn-go{background:#e64340;color:#fff;border:none;padding:6px 12px;border-radius:4px;}
.tip{font-size:14px;color:#999;margin-top:20px;line-height:1.6;}
</style>
</head>
<body>
<div class="container">
  <div class="title">拼多多助力互助码</div>
  <div class="input-box">
    <input type="text" id="code" placeholder="请输入9位助力邀请码" maxlength="9">
    <button id="submit">提交</button>
  </div>
  <div class="list-title">最新助力列表</div>
  <div id="list"></div>
  <div class="tip">提示：点击跳转可直接打开拼多多助力，每人可多次提交置顶</div>
</div>

<script>
let codeList = JSON.parse(localStorage.getItem('pddCodeList')) || [];
const listDom = document.getElementById('list');
const codeDom = document.getElementById('code');
const submitDom = document.getElementById('submit');

// 渲染列表
function render(){
  listDom.innerHTML = '';
  codeList.forEach(item=>{
    let hideCode = item.slice(0,2) + '**' + item.slice(4);
    let div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <span class="code-text">${hideCode}</span>
      <button class="btn-go" data-code="${item}">去助力</button>
    `;
    listDom.appendChild(div);
  })
  // 绑定跳转
  document.querySelectorAll('.btn-go').forEach(btn=>{
    btn.onclick = function(){
      let c = this.getAttribute('data-code');
      window.location.href = `pinduoduo://search?key=${c}`;
      alert('若未跳转，请复制邀请码手动打开拼多多');
    }
  })
  localStorage.setItem('pddCodeList',JSON.stringify(codeList));
}

// 提交
submitDom.onclick = function(){
  let val = codeDom.value.trim();
  if(val.length!==9){
    alert('请输入9位完整邀请码');
    return;
  }
  // 去重，有就置顶
  let idx = codeList.findIndex(item=>item===val);
  if(idx>-1){
    codeList.splice(idx,1);
  }
  codeList.unshift(val);
  codeDom.value = '';
  render();
  alert('提交成功，已置顶！');
}

render();
</script>
</body>
</html>
